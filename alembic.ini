# Alembic environment for the games schema on the steam/games DB.
# Connection creds come from config/steamdbconfig.json (see
# alembic/env.py); sqlalchemy.url here is a placeholder that env.py
# overrides. dbconfig.json (the reporting DB) is never used.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://localhost/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
